<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dress Code</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="DressCode.css" />
</head>
<body>

  <div class="mobile">

    <!-- CARD -->
    <div class="card">

      <!-- Shell Icon -->
      <img src="download__25_-removebg-preview.png" 
           class="shell" 
           alt="Shell Icon"
           loading="lazy">

      <h1 class="title">Dress Code</h1>

      <p class="desc">
        Please come dressed in beautiful attire that reflects 
        the festive and elegant spirit of our wedding.
      </p>

      <p class="desc">
        We would be delighted if you could embrace 
        the color palette of our celebration.
      </p>

      <!-- COLOR PALETTE -->
<div class="palette">
  <img src="Satin texture, light background, pearlescent colors, minimalism --ar 1_2 --v 6_1.jpg" alt="Color 1">
  <img src="Soft Satin Fabric By 1 Meter - Dusty-Blue.jpeg" alt="Color 2">
  <img src="Texture Satinée Couleur Champagne Soyeuse Un Tissu Luxueux Et élégant _ JPG Fond Téléchargement Gratuit - Pikbest.jpg" alt="Color 3">
  <img src="download (22).jpg" alt="Color 4">
  <img src="download (8).jpeg" alt="Color 5">
  <img src="1pc Wine Red Plain Satin Jacquard Fabric, Suitable For Christmas Decoration, Wedding Dress, Headpiece, Birthday Party, Dinner, Picnic, Home Decor.jpeg" alt="Color 6">
</div>

      <!-- Ribbon Bottom -->
      <img src="Zyrene_s____1_-removebg-preview.png" 
           class="ribbon" 
           alt="Ribbon Decoration"
           loading="lazy">

    </div>

    <!-- SAVE THE DATE -->
    <h2 class="save">SAVE THE DATE</h2>

    <!-- COUNTDOWN -->
    <div class="countdown">
      
      <div class="time">
        <div class="circle" id="days">00</div>
        <span>Days</span>
      </div>

      <div class="time">
        <div class="circle" id="hours">00</div>
        <span>Hours</span>
      </div>

      <div class="time">
        <div class="circle" id="minutes">00</div>
        <span>Minutes</span>
      </div>

      <div class="time">
        <div class="circle" id="seconds">00</div>
        <span>Seconds</span>
      </div>

    </div>

  </div>

  <!-- JS -->
  <script src="DressCode.js"></script>

</body>
</html>
